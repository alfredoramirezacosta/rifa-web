<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Ganador</title>

<style>

body{
margin:0;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.card{
background:#1c1c1c;
padding:40px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
}

.numero{
font-size:80px;
color:gold;
font-weight:bold;
}

.nombre{
font-size:32px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>🏆 GANADOR</h2>

<div class="numero" id="numero">--</div>
<div class="nombre" id="nombre"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCqVZwBX96EHfl3k__iqyc7rF1MZmSVpRI",
authDomain:"rifa-web-2b2f3.firebaseapp.com",
projectId:"rifa-web-2b2f3"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

db.collection("config")
.doc("ganador")
.onSnapshot(doc=>{

if(!doc.exists){
numero.innerText="--";
nombre.innerText="";
return;
}

let g=doc.data();

numero.innerText="#"+g.numero;
nombre.innerText=g.nombre;

confetti({
particleCount:250,
spread:180
});

});

</script>

</body>
</html>
