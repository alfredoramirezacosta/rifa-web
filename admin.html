<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Panel Admin</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:15px;
text-align:center;
}

h1{
font-size:28px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
font-size:20px;
border:none;
border-radius:12px;
font-weight:bold;
}

.ganar{
background:#00c853;
color:white;
}

.reset{
background:#d50000;
color:white;
}

table{
width:100%;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<h1>🎛 PANEL ADMIN</h1>

<button class="ganar" onclick="elegirGanador()">
🎰 Sortear Ganador
</button>

<button class="reset" onclick="resetearRifa()">
🔄 Resetear Rifa
</button>

<h2 id="ganador"></h2>

<table>
<tbody id="lista"></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="admin.js"></script>

</body>
</html>
