<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Rifa</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:15px;
}

h1{
font-size:26px;
}

input{
width:95%;
padding:15px;
margin:8px 0;
font-size:18px;
border-radius:10px;
border:none;
}

button{
width:95%;
padding:18px;
margin-top:10px;
font-size:20px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
}

#numeros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:15px;
}

.numero{
padding:12px;
background:#2c2c2c;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.ocupado{
background:#b71c1c;
pointer-events:none;
}

.seleccionado{
background:#ffd600;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🎟 Registro de Participante</h1>

<input id="nombre" placeholder="Nombre completo">
<input id="telefono" placeholder="Teléfono (10 dígitos)" maxlength="10">

<h3>Números Disponibles</h3>

<div id="numeros"></div>

<button onclick="numerosAleatorios()">
🎲 Elegir al azar
</button>

<button onclick="registrar()">
✅ Registrar Participante
</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey:"TU_APIKEY",
authDomain:"TU_DOMINIO",
projectId:"TU_PROJECTID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccionados=[];

function cargarNumeros(){

db.collection("participantes")
.onSnapshot(snapshot=>{

let ocupados=[];
snapshot.forEach(doc=>{
ocupados.push(doc.data().numero);
});

let contenedor=document.getElementById("numeros");
contenedor.innerHTML="";

for(let i=1;i<=100;i++){

let div=document.createElement("div");
div.className="numero";
div.innerText=i;

if(ocupados.includes(i)){
div.classList.add("ocupado");
}else{

div.onclick=()=>{
toggleNumero(i,div);
};

}

contenedor.appendChild(div);
}

});

}

function toggleNumero(num,elemento){

if(seleccionados.includes(num)){
seleccionados=seleccionados.filter(n=>n!==num);
elemento.classList.remove("seleccionado");
}else{
seleccionados.push(num);
elemento.classList.add("seleccionado");
}

}

function numerosAleatorios(){

seleccionados=[];

document
.querySelectorAll(".numero")
.forEach(n=>n.classList.remove("seleccionado"));

let disponibles=[];

document.querySelectorAll(".numero:not(.ocupado)")
.forEach(n=>{
disponibles.push(parseInt(n.innerText));
});

let cantidad=prompt("¿Cuántos números desea?");
cantidad=parseInt(cantidad);

if(!cantidad || cantidad<1) return;

for(let i=0;i<cantidad;i++){

let rand=disponibles.splice(
Math.floor(Math.random()*disponibles.length),1
)[0];

seleccionados.push(rand);

document.querySelectorAll(".numero")
.forEach(div=>{
if(parseInt(div.innerText)===rand){
div.classList.add("seleccionado");
}
});

}

}

function validarTelefono(tel){
return /^[0-9]{10}$/.test(tel);
}

async function registrar(){

let nombre=document.getElementById("nombre").value.trim();
let telefono=document.getElementById("telefono").value.trim();

if(nombre==="" || telefono===""){
alert("Complete todos los campos");
return;
}

if(!validarTelefono(telefono)){
alert("Teléfono inválido (10 dígitos)");
return;
}

if(seleccionados.length===0){
alert("Seleccione al menos un número");
return;
}

for(const numero of seleccionados){

await db.collection("participantes").add({
nombre,
telefono,
numero
});

let mensaje=
`Hola ${nombre} ✅
Registro confirmado.

Número(s): ${numero}`;

window.open(
`https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`
);

}

alert("Participante registrado");

location.reload();

}

cargarNumeros();

</script>

</body>
</html>
