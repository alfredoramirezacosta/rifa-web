<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Rifa</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:15px;
}

input{
width:95%;
padding:15px;
margin:8px 0;
font-size:18px;
border-radius:10px;
border:none;
}

button{
width:95%;
padding:18px;
margin-top:10px;
font-size:20px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
}

#numeros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:15px;
}

.numero{
padding:12px;
background:#2c2c2c;
border-radius:8px;
cursor:pointer;
}

.ocupado{
background:#b71c1c;
pointer-events:none;
}

.seleccionado{
background:#ffd600;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<h2>🎟 Registro Participante</h2>

<input id="telefono"
placeholder="Teléfono (10 dígitos)"
maxlength="10"
oninput="buscarCliente()">

<input id="nombre"
placeholder="Nombre completo">

<h3>Números disponibles</h3>

<div id="numeros"></div>

<button onclick="numerosAleatorios()">🎲 Elegir al azar</button>

<button onclick="registrar()">✅ Registrar</button>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig={
apiKey:"TU_APIKEY",
authDomain:"TU_DOMINIO",
projectId:"TU_PROJECTID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let seleccionados=[];

/* =========================
BUSCAR CLIENTE AUTOMATICO
=========================*/

async function buscarCliente(){

let telefono=document.getElementById("telefono").value;

if(!/^[0-9]{10}$/.test(telefono)) return;

let doc=await db.collection("clientes")
.doc(telefono)
.get();

if(doc.exists){
document.getElementById("nombre").value=
doc.data().nombre;
}

}

/* =========================
CARGAR NUMEROS
=========================*/

function cargarNumeros(){

db.collection("participantes")
.onSnapshot(snapshot=>{

let ocupados=[];

snapshot.forEach(doc=>{
ocupados.push(doc.data().numero);
});

let cont=document.getElementById("numeros");
cont.innerHTML="";

for(let i=1;i<=100;i++){

let div=document.createElement("div");
div.className="numero";
div.innerText=i;

if(ocupados.includes(i)){
div.classList.add("ocupado");
}else{
div.onclick=()=>toggleNumero(i,div);
}

cont.appendChild(div);
}

});

}

function toggleNumero(num,el){

if(seleccionados.includes(num)){
seleccionados=
seleccionados.filter(n=>n!==num);
el.classList.remove("seleccionado");
}else{
seleccionados.push(num);
el.classList.add("seleccionado");
}

}

/* =========================
NUMEROS ALEATORIOS
=========================*/

function numerosAleatorios(){

seleccionados=[];

document.querySelectorAll(".numero")
.forEach(n=>n.classList.remove("seleccionado"));

let libres=[];

document.querySelectorAll(".numero:not(.ocupado)")
.forEach(n=>{
libres.push(parseInt(n.innerText));
});

let cantidad=parseInt(prompt("Cantidad de números"));

for(let i=0;i<cantidad;i++){

let r=libres.splice(
Math.floor(Math.random()*libres.length),1
)[0];

seleccionados.push(r);

document.querySelectorAll(".numero")
.forEach(d=>{
if(parseInt(d.innerText)===r)
d.classList.add("seleccionado");
});

}

}

/* =========================
REGISTRAR
=========================*/

async function registrar(){

let nombre=
document.getElementById("nombre").value.trim();

let telefono=
document.getElementById("telefono").value.trim();

if(nombre===""||telefono===""){
alert("Complete los campos");
return;
}

if(!/^[0-9]{10}$/.test(telefono)){
alert("Teléfono inválido");
return;
}

if(seleccionados.length===0){
alert("Seleccione números");
return;
}

/* GUARDAR CLIENTE */
await db.collection("clientes")
.doc(telefono)
.set({
nombre:nombre
});

/* GUARDAR PARTICIPACIONES */
for(const numero of seleccionados){

await db.collection("participantes").add({
nombre,
telefono,
numero
});

let mensaje=
`Hola ${nombre} ✅
Tu número de rifa es: ${numero}`;

window.open(
`https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`
);

}

alert("Registro exitoso");

location.reload();

}

cargarNumeros();

</script>

</body>
</html>
