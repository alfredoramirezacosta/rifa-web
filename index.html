<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registro Rifa</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

input,button{
padding:12px;
margin:10px;
font-size:18px;
width:250px;
}

button{
background:#25D366;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎟 Registro de Participante</h1>

<input id="nombre" placeholder="Nombre"><br>
<input id="telefono" placeholder="Teléfono"><br>

<button onclick="registrar()">Registrar</button>

<h2 id="mensaje"></h2>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCqVZwBX96EHfl3k__iqyc7rF1MZmSVpRI",
authDomain:"rifa-web-2b2f3.firebaseapp.com",
projectId:"rifa-web-2b2f3",
storageBucket:"rifa-web-2b2f3.firebasestorage.app",
messagingSenderId:"440243321091",
appId:"1:440243321091:web:3a6a0a27e4e418cf6b9136"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

async function registrar(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;

if(!nombre||!telefono){
alert("Completa datos");
return;
}

let usados=[];
let snap=await db.collection("participantes").get();

snap.forEach(doc=>{
usados.push(doc.data().numero);
});

let disponibles=[];
for(let i=1;i<=100;i++){
if(!usados.includes(i)) disponibles.push(i);
}

if(disponibles.length===0){
alert("Rifa llena");
return;
}

let numero=
disponibles[Math.floor(Math.random()*disponibles.length)];

await db.collection("participantes").add({
nombre,
telefono,
numero
});

document.getElementById("mensaje").innerText=
`✅ Registrado con número #${numero}`;

document.getElementById("nombre").value="";
document.getElementById("telefono").value="";
}

</script>

</body>
</html>
