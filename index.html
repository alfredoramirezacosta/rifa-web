<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro Rifa</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:15px;
}

input{
width:95%;
padding:15px;
margin:10px 0;
font-size:18px;
border-radius:10px;
border:none;
}

button{
width:95%;
padding:18px;
margin-top:10px;
font-size:20px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

#numeros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:15px;
}

.numero{
padding:12px;
background:#2c2c2c;
border-radius:8px;
cursor:pointer;
}

.ocupado{
background:#b71c1c;
pointer-events:none;
}

.seleccionado{
background:#ffd600;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<h2>🎟 Registro Participante</h2>

<!-- TELEFONO -->
<input
id="telefono"
type="tel"
inputmode="numeric"
maxlength="10"
placeholder="Teléfono (10 dígitos)"
oninput="validarTelefono()">

<!-- NOMBRE -->
<input
id="nombre"
placeholder="Nombre completo">

<h3>Números disponibles</h3>
<div id="numeros"></div>

<button onclick="numerosAleatorios()">🎲 Números al azar</button>

<button onclick="registrar()">✅ Registrar</button>


<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

/* ======================
FIREBASE CONFIG
======================*/

const firebaseConfig={
apiKey:"TU_APIKEY",
authDomain:"TU_DOMINIO",
projectId:"TU_PROJECTID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();


let seleccionados=[];


/* ======================
SOLO NUMEROS TELEFONO
======================*/

function validarTelefono(){

let input=document.getElementById("telefono");

/* elimina TODO lo que no sea número */
input.value=input.value.replace(/\D/g,'');

/* buscar cliente solo si ya tiene 10 */
if(input.value.length===10){
buscarCliente(input.value);
}

}


/* ======================
AUTOLLENAR NOMBRE
======================*/

async function buscarCliente(telefono){

let doc=
await db.collection("clientes")
.doc(telefono)
.get();

if(doc.exists){
document.getElementById("nombre").value=
doc.data().nombre;
}

}


/* ======================
CARGAR TABLERO
======================*/

function cargarNumeros(){

db.collection("participantes")
.onSnapshot(snapshot=>{

let ocupados=[];

snapshot.forEach(doc=>{
ocupados.push(doc.data().numero);
});

let cont=document.getElementById("numeros");
cont.innerHTML="";

for(let i=1;i<=100;i++){

let div=document.createElement("div");
div.className="numero";
div.innerText=i;

if(ocupados.includes(i)){
div.classList.add("ocupado");
}else{
div.onclick=()=>toggleNumero(i,div);
}

cont.appendChild(div);
}

});

}


function toggleNumero(num,el){

if(seleccionados.includes(num)){
seleccionados=
seleccionados.filter(n=>n!==num);
el.classList.remove("seleccionado");
}else{
seleccionados.push(num);
el.classList.add("seleccionado");
}

}


/* ======================
ALEATORIOS
======================*/

function numerosAleatorios(){

let libres=[];

document
.querySelectorAll(".numero:not(.ocupado)")
.forEach(n=>{
libres.push(parseInt(n.innerText));
});

let cantidad=parseInt(
prompt("¿Cuántos números?")
);

if(!cantidad || cantidad<=0) return;

seleccionados=[];

document.querySelectorAll(".numero")
.forEach(n=>n.classList.remove("seleccionado"));

for(let i=0;i<cantidad;i++){

if(libres.length===0) break;

let r=libres.splice(
Math.floor(Math.random()*libres.length),1
)[0];

seleccionados.push(r);

document.querySelectorAll(".numero")
.forEach(d=>{
if(parseInt(d.innerText)===r)
d.classList.add("seleccionado");
});

}

}


/* ======================
REGISTRAR ✅
======================*/

async function registrar(){

let nombre=
document.getElementById("nombre").value.trim();

let telefono=
document.getElementById("telefono").value.trim();


/* VALIDACIONES */

if(telefono.length!==10){
alert("Teléfono inválido");
return;
}

if(nombre===""){
alert("Ingrese nombre");
return;
}

if(seleccionados.length===0){
alert("Seleccione números");
return;
}


/* GUARDAR CLIENTE */
await db.collection("clientes")
.doc(telefono)
.set({
nombre:nombre
});


/* GUARDAR NUMEROS */
for(const numero of seleccionados){

await db.collection("participantes").add({
nombre,
telefono,
numero
});

}


/* WHATSAPP */
let mensaje=
`Hola ${nombre} ✅
Tus números son: ${seleccionados.join(", ")}`;

window.open(
`https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`
);


alert("✅ Registro exitoso");

location.reload();

}


cargarNumeros();

</script>

</body>
</html>
