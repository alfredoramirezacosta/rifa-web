<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro Rifa</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:15px;
}

input{
width:95%;
padding:16px;
margin:10px 0;
font-size:18px;
border-radius:10px;
border:none;
}

button{
width:95%;
padding:18px;
margin-top:10px;
font-size:20px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

#numeros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:15px;
}

.numero{
padding:14px;
background:#2c2c2c;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

.ocupado{
background:#b71c1c;
pointer-events:none;
}

.seleccionado{
background:#ffd600;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<h2>🎟 Registro Participante</h2>

<input
id="telefono"
type="tel"
inputmode="numeric"
pattern="[0-9]*"
maxlength="10"
placeholder="Teléfono (10 dígitos)"
oninput="validarTelefono()"
required>

<input
id="nombre"
placeholder="Nombre completo"
required>

<h3>Números disponibles</h3>

<div id="numeros"></div>

<button onclick="numerosAleatorios()">🎲 Elegir al azar</button>

<button onclick="registrar()">✅ Registrar</button>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig={
apiKey:"AIzaSyCqVZwBX96EHfl3k__iqyc7rF1MZmSVpRI",
authDomain:"rifa-web-2b2f3.firebaseapp.com",
projectId:"rifa-web-2b2f3",
storageBucket:"rifa-web-2b2f3.firebasestorage.app",
messagingSenderId:"440243321091",
appId:"1:440243321091:web:3a6a0a27e4e418cf6b9136"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let seleccionados=[];


/* ================= TELEFONO ================= */

function validarTelefono(){

let input=document.getElementById("telefono");

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length>10)
input.value=input.value.slice(0,10);

if(input.value.length===10)
buscarCliente(input.value);
}


/* ================= AUTOCOMPLETAR ================= */

async function buscarCliente(tel){

let doc=await db.collection("clientes")
.doc(tel).get();

if(doc.exists){
document.getElementById("nombre").value=
doc.data().nombre;
}

}


/* ================= TABLERO ================= */

function cargarNumeros(){

db.collection("participantes")
.onSnapshot(snapshot=>{

let ocupados=[];

snapshot.forEach(doc=>{
ocupados.push(doc.data().numero);
});

let cont=document.getElementById("numeros");
cont.innerHTML="";

for(let i=1;i<=100;i++){

let div=document.createElement("div");
div.className="numero";
div.innerText=i;

if(ocupados.includes(i)){
div.classList.add("ocupado");
}else{
div.onclick=()=>toggleNumero(i,div);
}

cont.appendChild(div);
}

});

}


function toggleNumero(num,el){

if(seleccionados.includes(num)){
seleccionados=
seleccionados.filter(n=>n!==num);
el.classList.remove("seleccionado");
}else{
seleccionados.push(num);
el.classList.add("seleccionado");
}

}


/* ================= ALEATORIOS ================= */

function numerosAleatorios(){

let libres=[];

document
.querySelectorAll(".numero:not(.ocupado)")
.forEach(n=>{
libres.push(parseInt(n.innerText));
});

let cantidad=parseInt(prompt("¿Cuántos números?"));

if(!cantidad || cantidad<=0) return;

seleccionados=[];

document.querySelectorAll(".numero")
.forEach(n=>n.classList.remove("seleccionado"));

for(let i=0;i<cantidad;i++){

if(libres.length===0) break;

let r=
libres.splice(
Math.floor(Math.random()*libres.length),1
)[0];

seleccionados.push(r);

document.querySelectorAll(".numero")
.forEach(d=>{
if(parseInt(d.innerText)===r)
d.classList.add("seleccionado");
});

}

}


/* ================= REGISTRAR ================= */

async function registrar(){

try{

let nombre=
document.getElementById("nombre").value.trim();

let telefono=
document.getElementById("telefono").value.trim();

if(telefono.length!==10){
alert("Teléfono inválido");
return;
}

if(nombre===""){
alert("Ingrese nombre");
return;
}

if(seleccionados.length===0){
alert("Seleccione números");
return;
}

/* guardar cliente */
await db.collection("clientes")
.doc(telefono)
.set({nombre});

/* guardar números */
for(const numero of seleccionados){

await db.collection("participantes").add({
nombre,
telefono,
numero
});

}

/* ================= WHATSAPP ================= */

const NUMERO_WHATSAPP="526624446775";

/* ordenar números */
seleccionados.sort((a,b)=>a-b);

/* crear mensaje */
let mensaje=
`🎟 *Registro Rifa*%0A%0A`+
`👤 Nombre: ${nombre}%0A`+
`📱 Teléfono: ${telefono}%0A`+
`🎯 Números: ${seleccionados.join(", ")}`;

/* abrir whatsapp */
window.open(
`https://wa.me/${NUMERO_WHATSAPP}?text=${mensaje}`,
"_blank"
);

alert("✅ Registro exitoso");

location.reload();

}catch(e){
console.error(e);
alert("Error al registrar");
}

}

cargarNumeros();

</script>

</body>
</html>
