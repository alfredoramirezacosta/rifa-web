<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Registro Rifa</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:15px;
}

h1{
margin-bottom:10px;
}

input{
padding:14px;
margin:8px;
font-size:18px;
width:90%;
max-width:320px;
border-radius:8px;
border:none;
}

button{
padding:15px;
font-size:18px;
background:#25D366;
border:none;
color:white;
border-radius:10px;
margin-top:10px;
width:90%;
max-width:320px;
cursor:pointer;
}

#numeros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:20px;
}

.numero{
padding:12px;
background:#222;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

.disponible{
background:#2ecc71;
}

.ocupado{
background:#444;
color:#888;
pointer-events:none;
}

.seleccionado{
background:gold;
color:black;
}

#mensaje{
margin-top:20px;
font-size:22px;
color:#00ffae;
}

</style>

</head>

<body>

<h1>🎟 Registro de Participante</h1>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<h3>Selecciona un número</h3>

<div id="numeros"></div>

<button onclick="registrar()">
Registrar Participante
</button>

<h2 id="mensaje"></h2>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// =======================
// FIREBASE
// =======================
const firebaseConfig={
apiKey:"AIzaSyCqVZwBX96EHfl3k__iqyc7rF1MZmSVpRI",
authDomain:"rifa-web-2b2f3.firebaseapp.com",
projectId:"rifa-web-2b2f3",
storageBucket:"rifa-web-2b2f3.firebasestorage.app",
messagingSenderId:"440243321091",
appId:"1:440243321091:web:3a6a0a27e4e418cf6b9136"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let numeroSeleccionado=null;


// =======================
// MOSTRAR NUMEROS
// =======================
db.collection("participantes")
.onSnapshot(snapshot=>{

let usados=[];

snapshot.forEach(doc=>{
usados.push(doc.data().numero);
});

dibujarNumeros(usados);

});


function dibujarNumeros(usados){

const contenedor=
document.getElementById("numeros");

contenedor.innerHTML="";

for(let i=1;i<=100;i++){

let div=document.createElement("div");

div.innerText=i;
div.classList.add("numero");

if(usados.includes(i)){
div.classList.add("ocupado");
}else{
div.classList.add("disponible");

div.onclick=()=>{
document
.querySelectorAll(".numero")
.forEach(n=>n.classList.remove("seleccionado"));

div.classList.add("seleccionado");
numeroSeleccionado=i;
};
}

contenedor.appendChild(div);

}

}


// =======================
// REGISTRAR
// =======================
async function registrar(){

let nombre=
document.getElementById("nombre").value;

let telefono=
document.getElementById("telefono").value;

if(!nombre||!telefono){
alert("Completa datos");
return;
}


// obtener usados otra vez
let usados=[];
let snap=
await db.collection("participantes").get();

snap.forEach(doc=>{
usados.push(doc.data().numero);
});

let numeroFinal;

// si eligió numero
if(numeroSeleccionado){

if(usados.includes(numeroSeleccionado)){
alert("Número ocupado");
return;
}

numeroFinal=numeroSeleccionado;

}else{

let disponibles=[];

for(let i=1;i<=100;i++){
if(!usados.includes(i))
disponibles.push(i);
}

if(disponibles.length===0){
alert("Rifa llena");
return;
}

numeroFinal=
disponibles[
Math.floor(Math.random()*disponibles.length)
];

}


// guardar
await db.collection("participantes").add({
nombre,
telefono,
numero:numeroFinal
});


document.getElementById("mensaje").innerText=
`✅ Registrado con número #${numeroFinal}`;

document.getElementById("nombre").value="";
document.getElementById("telefono").value="";
numeroSeleccionado=null;

}

</script>

</body>
</html>
